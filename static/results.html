<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main id="main"></main>

    <script>
        let ul = document.querySelector("ul")
        let title = new URLSearchParams(window.location.search).get("title");
    console.log(title);
    fetch("/api/search?primaryTitle=" + title).then(res=>res.json()).then(data=>{
        console.log(data)
        data.titles.forEach(m=>{
            document.querySelector("#main").innerHTML += `<div class="film_div"><h2>${m.primaryTitle}</h2>
                <h4>${m.description}</h4>
                <img src=${m.primaryImage}></img></div>
            `
        })
    })
    </script>
</body>
</html>
