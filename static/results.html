<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Search Results</title>
    <link rel="stylesheet" href="style.css">
</head>
<!-- <header>
    <h1>Hi</h1>
</header> -->

<body>

    <main id="main"></main>

    <script>
        let ul = document.querySelector("ul")
        let title = new URLSearchParams(window.location.search).get("primaryTitle");
        let aggregateRating = new URLSearchParams(window.location.search).get("aggregateRating");
        console.log(title);
        if (title) {

            fetch("/api/search?primaryTitle=" + title).then(res => res.json()).then(data => {
                console.log(data)
                data.titles.forEach(m => {
                    fetch(`https://api.imdbapi.dev/titles/${m.id}`)
                        .then(res => res.json())
                        .then(detail => {
                            document.querySelector("#main").innerHTML += `
                    <div class="film_div">
                        <h2>${m.primaryTitle}</h2>
                        <h4>${detail.plot ?? ''}</h4>
                        <img src="${m.primaryImage?.url ?? ''} " weight=300 height=600>
                        <h4>rating = ${m.rating.aggregateRating}</h4>
                    </div>
                `;
                        });
                });
            })
        }
        else if( aggregateRating){
            fetch("/api/search?aggregateRating=" + aggregateRating).then(res => res.json()).then(data => {
                console.log(data)
                data.titles.forEach(m => {
                    fetch(`https://api.imdbapi.dev/titles/${m.id}`)
                        .then(res => res.json())
                        .then(detail => {
                            document.querySelector("#main").innerHTML += `
                    <div class="film_div">
                        <h2>${m.primaryTitle}</h2>
                        <h4>${detail.plot ?? ''}</h4>
                        <img src="${m.primaryImage?.url ?? ''} " weight=300 height=600>
                        <h4>rating = ${m.rating.aggregateRating}</h4>
                    </div>
                `;
                        });
                });
            })
        }
    </script>
</body>

</html>
