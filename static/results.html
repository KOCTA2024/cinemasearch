<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <main id="main"></main>

    <script>
        let ul = document.querySelector("ul")
        let title = new URLSearchParams(window.location.search).get("title");
    console.log(title);
    fetch("/api/search?title=" + title).then(res=>res.json()).then(data=>{
        console.log(data)
        data.results.forEach(m=>{
            document.querySelector("#main").innerHTML += `<div class="film_div">${m.primaryTitle}</div>`
        })
    })
    </script>
</body>
</html>
